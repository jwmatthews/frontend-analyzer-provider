# Prop removals â€” codemod-covered

- ruleID: pfv6-prop-remove-accordion-ishidden
  description: "AccordionContent: isHidden prop removed"
  labels: [change-type=prop-removal, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^isHidden$", location: JSX_PROP, component: "^AccordionContent$" }
  message: "AccordionContent 'isHidden' prop removed. Visibility is now set by 'isExpanded' on AccordionItem. Codemod: accordionContent-remove-isHidden-prop"

- ruleID: pfv6-prop-remove-card-various
  description: "Card: multiple props removed"
  labels: [change-type=prop-removal, has-codemod=true]
  effort: 2
  category: mandatory
  when:
    frontend.referenced: { pattern: "^(isSelectableRaised|isDisabledRaised|hasSelectableInput|selectableInputAriaLabel|onSelectableInputChange|isFlat|isRounded)$", location: JSX_PROP, component: "^Card$" }
  message: "Card props isSelectableRaised, isDisabledRaised, hasSelectableInput, selectableInputAriaLabel, onSelectableInputChange, isFlat, isRounded removed in PF v6. Codemod: card-remove-various-props"

